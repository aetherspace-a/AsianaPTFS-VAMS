<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0"/>
  <title>Access Denied — Asiana PTFS</title>
  <link rel="stylesheet" href="/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
  <script src="/app.js" defer></script>
</head>
<body>
  <div class="noise-overlay"></div>
  <div class="apple-ambient">
    <div class="mesh-blob mesh-1"></div>
    <div class="mesh-blob mesh-2"></div>
    <div class="mesh-blob mesh-3"></div>
  </div>

  <nav>
    <a class="logo" href="/">
      <img src="https://upload.wikimedia.org/wikipedia/commons/4/4e/Asiana_Airlines-Logo_New.svg" alt="Asiana Airlines Logo" class="logo-img">
    </a>
    <ul>
      <li><a href="/">Home</a></li>
      <li><a href="/economy.html">Economy</a></li>
      <li><a href="/flights.html">Flights</a></li>
      <li><a href="/pilot.html">Pilot</a></li>
    </ul>
    <div class="nav-right">
      <button class="theme-btn" onclick="toggleTheme()">Appearance</button>
      <a href="/auth/discord" class="discord-login-btn" id="login-btn">Login</a>
    </div>
  </nav>

  <main class="page-main reveal" style="text-align:center">
    <div class="apple-glass" style="padding:5rem; max-width:650px; margin:4rem auto">
      <div style="width:80px; height:80px; border-radius:50%; background:rgba(255,69,58,0.1); border:1px solid rgba(255,69,58,0.2); display:flex; align-items:center; justify-content:center; margin:0 auto 2rem">
        <span class="material-symbols-outlined" style="font-size:3rem; color:var(--red)">shield_lock</span>
      </div>
      <h1 style="font-size:2.5rem; margin-bottom:1rem">Access Restricted</h1>
      <p class="small-text" style="margin-bottom:3rem">Your account does not have the required permissions to access this terminal. If you are a staff member, ensure you are logged in correctly.</p>
      
      <div id="denied-user" style="display:none; margin-bottom:3rem; align-items:center; justify-content:center; gap:1rem">
        <img id="denied-avatar" src="" style="width:40px; height:40px; border-radius:50%; border:1px solid var(--glass-border)">
        <span id="denied-username" style="font-weight:700"></span>
      </div>

      <div style="display:flex; gap:1.5rem; justify-content:center">
        <a href="/" class="btn btn-outline">Return Home</a>
        <a href="/auth/discord" class="btn" id="action-btn">Sign In</a>
      </div>
    </div>
  </main>

  <script>
    async function initUnauthorized(){
      const user = await initNavAuth();
      if(user){
          document.getElementById('denied-user').style.display = 'flex';
          document.getElementById('denied-avatar').src = user.avatar;
          document.getElementById('denied-username').textContent = user.username;
          document.getElementById('action-btn').textContent = 'Switch Account';
          document.getElementById('action-btn').href = '/auth/logout';
      }
    }
    document.addEventListener('DOMContentLoaded', initUnauthorized);
  </script>
</body>
</html>
